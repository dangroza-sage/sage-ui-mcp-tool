<html>
  <head>
    <title>Tool Inspector</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1>Sage UI Smart Assistant</h1>
      </div>
      <h2 class="collapsible-header">WebMCP Tools</h2>
      <div class="section-content">

      <div id="status"></div>

      <div class="tab-picker-grid">
        <button id="autoRefreshToggleBtn" class="secondary toggle-button" type="button" aria-pressed="false">
          Auto-refresh tabs: Off
        </button>
        <div class="form-group compact">
          <label for="sourceTabSelect">Source Tab</label>
          <select id="sourceTabSelect"></select>
          <div class="field-hint">Import page text from another open tab.</div>
        </div>
      </div>

      <div class="toolbar">
        <input id="toolFilterInput" type="search" placeholder="Filter tools by name or description" />
        <button id="refreshToolsBtn" class="secondary" type="button">Refresh</button>
      </div>

      <div class="form-group compact">
        <button id="importSourceTextBtn" class="secondary" type="button">Insert Source Tab Text into Prompt</button>
      </div>

      <div class="table-container">
        <table id="resultsTable">
          <thead>
            <tr id="tableHeaderRow"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="copyToClipboard">
          <span id="copyAsScriptToolConfig">📝 Copy as ScriptToolConfig</span>
          <span id="copyAsJSON">📝 Copy as JSON</span>
        </div>
      </div>
      </div>

      <h2 class="collapsible-header">Interact with the Page</h2>
      <div class="section-content">

      <div class="form-group">
        <label for="userPromptText">User Prompt</label>
        <textarea id="userPromptText"></textarea>
      </div>

      <div class="form-group">
        <button id="promptBtn" disabled>Send</button>
        <button id="resetBtn" class="secondary" disabled>Reset</button>
        <button id="apiKeyBtn" class="secondary">Set Gemini API key</button>
        <button id="traceBtn" class="secondary">Copy trace</button>
      </div>

      <pre id="promptResults"></pre>

      <div class="form-group">
        <label for="toolNames">Tool</label>
        <select id="toolNames"></select>
      </div>

      <div id="selectedToolDetails" class="tool-details is-hidden">
        <div class="tool-details-header">Selected Tool Details</div>
        <div id="selectedToolDescription" class="tool-description"></div>
        <pre id="selectedToolSchema"></pre>
      </div>

      <div class="form-group">
        <label for="inputArgsText">Input Arguments</label>
        <textarea id="inputArgsText">{"text": "hello world"}</textarea>
      </div>

      <div class="form-group">
        <button id="formatArgsBtn" class="secondary" type="button">Format JSON</button>
        <button id="executeBtn">Execute Tool</button>
      </div>

      <pre id="toolResults"></pre>
      </div>
    </div>
    <script type="module" src="sidebar.js"></script>
  </body>
</html>
