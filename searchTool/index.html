<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu Search</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <link rel="apple-touch-icon" href="../assets/favicon.png" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./search-tool.css" />
  </head>
  <body>
    <div class="container search-tool-page">
      <div class="page-header">
        <div class="brand">
          <img class="brand-logo" src="../assets/logo.png" alt="Sage UI Smart Assistant logo" />
          <h1>Menu Search</h1>
        </div>
      </div>

      <nav class="panel-nav" aria-label="Panel navigation">
        <a class="panel-nav-link" href="../sidebar.html">Assistant</a>
        <a class="panel-nav-link is-active" href="./index.html" aria-current="page">Menu Search</a>
      </nav>

      <div id="status" data-state="info">Loading menu items…</div>

      <div class="form-group compact">
        <label for="menuSearchInput">Search menu items</label>
        <div class="inline-field-row">
          <input id="menuSearchInput" type="search" placeholder="Search by menu label" />
          <button id="refreshMenuBtn" class="secondary button-with-icon inline-icon-button" type="button">
            <img class="button-icon" src="../assets/icons/90x90_360-reload_green-on-transparent_icon (original).png" alt="" aria-hidden="true" />
            <span>Refresh</span>
          </button>
        </div>
        <div id="pageMeta" class="field-hint"></div>
      </div>

      <div class="search-tool-summary">
        <span id="menuCount">0 items</span>
      </div>

      <div id="menuEmptyState" class="tool-details is-hidden">
        <div class="tool-description">No menu items found on the current tab.</div>
      </div>

      <div id="menuList" class="menu-results"></div>

      <dialog id="linkPreviewDialog" class="link-preview-dialog">
        <div class="link-preview-header">
          <h2>Updated Link</h2>
          <button id="closeLinkPreviewBtn" class="secondary" type="button">Close</button>
        </div>
        <div id="linkPreviewTitle" class="menu-result-title"></div>
        <pre id="linkPreviewText" class="link-preview-text"></pre>
      </dialog>
    </div>

    <script type="module" src="./search-tool.js"></script>
  </body>
</html>
